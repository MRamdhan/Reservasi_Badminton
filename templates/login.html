<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Badminton Court</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <span class="logo">🏸 Badminton Court</span>

            <h1>Selamat datang</h1>
            <p class="subtitle">Masuk untuk melanjutkan reservasi lapangan</p>

            <form method="POST">
                <div class="form-group">
                    <label for="nama">Nama</label>
                    <input id="nama" name="nama" type="text" placeholder="Masukkan nama kamu" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Masukkan password" autocomplete="current-password" required>
                </div>

                <button type="submit">Masuk</button>
            </form>

            <p class="auth-footer">
                Belum punya akun? <a href="/register">Daftar sekarang</a>
            </p>
        </div>
    </div>

</body>
</html>
