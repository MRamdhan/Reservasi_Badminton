<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar — Badminton Court</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <span class="logo">🏸 Badminton Court</span>

            <h1>Buat akun baru</h1>
            <p class="subtitle">Daftar untuk mulai reservasi lapangan badminton</p>

            <form method="POST">
                <div class="form-group">
                    <label for="nama">Nama</label>
                    <input id="nama" name="nama" type="text" placeholder="Nama lengkap kamu" autocomplete="name" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Buat password yang kuat" autocomplete="new-password" required>
                </div>

                <div class="form-group">
                    <label for="telepon">Nomor Telepon</label>
                    <input id="telepon" name="telepon" type="tel" placeholder="Contoh: 08123456789" autocomplete="tel" required>
                </div>

                <button type="submit">Daftar Sekarang</button>
            </form>

            <p class="auth-footer">
                Sudah punya akun? <a href="/login">Masuk di sini</a>
            </p>
        </div>
    </div>

</body>
</html>
